<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IoT Audiometry System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-50 min-h-screen">

    <nav class="bg-blue-600 text-white shadow-lg p-4 mb-6">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="font-bold text-xl">Audiometry Portal</h1>
            <div class="space-x-4">
                <button onclick="showView('test')" class="hover:underline">Patient Test</button>
                <button onclick="showView('dashboard')" class="hover:underline">Doctor Dashboard</button>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-4">

        <div id="view-test" class="view-content">
            <div id="setup-section" class="bg-white p-8 rounded-xl shadow-sm border">
                <h2 class="text-2xl font-semibold mb-4">New Hearing Test</h2>
                <input type="text" id="patient-id" placeholder="Enter Patient ID (e.g. P101)" class="w-full p-3 border rounded-lg mb-4 focus:ring-2 focus:ring-blue-500 outline-none">
                <button onclick="startTest()" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 transition">Begin Test</button>
            </div>

            <div id="test-phase" class="hidden bg-white p-8 rounded-xl shadow-sm border text-center">
                <p class="text-gray-500 mb-2">Testing Frequency</p>
                <div class="text-6xl font-black text-blue-600 mb-8"><span id="display-freq">250</span><span class="text-2xl">Hz</span></div>
                
                <p class="text-lg mb-6 text-gray-700">Can the patient hear the tone?</p>
                <div class="flex gap-4 justify-center">
                    <button onclick="recordStep(true)" class="bg-green-500 text-white px-10 py-4 rounded-xl font-bold text-xl hover:bg-green-600 shadow-md">YES</button>
                    <button onclick="recordStep(false)" class="bg-red-500 text-white px-10 py-4 rounded-xl font-bold text-xl hover:bg-red-600 shadow-md">NO</button>
                </div>
            </div>

            <div id="completion-screen" class="hidden bg-white p-8 rounded-xl shadow-sm border text-center">
                <div class="text-green-500 text-5xl mb-4">✓</div>
                <h2 class="text-2xl font-bold mb-2">Test Complete</h2>
                <p class="text-gray-600 mb-6">Data has been synced to the secure database.</p>
                <button onclick="location.reload()" class="bg-blue-100 text-blue-700 px-6 py-2 rounded-lg">Start Another</button>
            </div>
        </div>

        <div id="view-dashboard" class="view-content hidden">
            <div class="bg-white p-6 rounded-xl shadow-sm border">
                <h2 class="text-2xl font-bold mb-6 text-gray-800">Results Analysis</h2>
                
                <div class="mb-10">
                    <canvas id="audiogramChart" height="150"></canvas>
                </div>

                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="border-b text-gray-400 uppercase text-xs">
                                <th class="pb-3">Patient ID</th>
                                <th class="pb-3 text-center">250Hz</th>
                                <th class="pb-3 text-center">500Hz</th>
                                <th class="pb-3 text-center">1000Hz</th>
                                <th class="pb-3 text-center">2000Hz</th>
                                <th class="pb-3 text-center">4000Hz</th>
                                <th class="pb-3 text-center">8000Hz</th>
                            </tr>
                        </thead>
                        <tbody id="results-table-body" class="text-gray-700">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>

    </main>

    <script>
        // CONFIGURATION
        const G_SCRIPT_URL = "YOUR_APPS_SCRIPT_URL"; // Replace this!
        const frequencies = [250, 500, 1000, 2000, 4000, 8000];
        
        // APP STATE
        let currentIndex = 0;
        let testData = [];
        let currentPatient = "";
        let myChart = null;

        function showView(view) {
            document.querySelectorAll('.view-content').forEach(v => v.classList.add('hidden'));
            document.getElementById(`view-${view}`).classList.remove('hidden');
            if(view === 'dashboard') loadDashboardData();
        }

        // --- TEST LOGIC ---
        function startTest() {
            currentPatient = document.getElementById('patient-id').value;
            if(!currentPatient) return alert("Please enter a Patient ID");
            
            document.getElementById('setup-section').classList.add('hidden');
            document.getElementById('test-phase').classList.remove('hidden');
            updateESP(frequencies[currentIndex]);
        }

        async function recordStep(heard) {
            testData.push({ freq: frequencies[currentIndex], heard: heard ? 1 : 0 });
            
            if (currentIndex < frequencies.length - 1) {
                currentIndex++;
                document.getElementById('display-freq').innerText = frequencies[currentIndex];
                updateESP(frequencies[currentIndex]);
            } else {
                finishAndSubmit();
            }
        }

        async function updateESP(freq) {
            // Sends current freq to Google Sheet for ESP32 to read
            fetch(G_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ action: "SET_FREQ", freq: freq, patient: currentPatient })
            });
        }

        async function finishAndSubmit() {
            document.getElementById('test-phase').classList.add('hidden');
            document.getElementById('completion-screen').classList.remove('hidden');

            // Send full results to Sheets for permanent storage
            fetch(G_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ action: "SAVE_RESULTS", patient: currentPatient, results: testData })
            });
        }

        // --- DASHBOARD LOGIC ---
        async function loadDashboardData() {
            const response = await fetch(G_SCRIPT_URL + "?action=GET_RESULTS");
            const allData = await response.json();
            
            const tbody = document.getElementById('results-table-body');
            tbody.innerHTML = "";

            allData.forEach(row => {
                const tr = document.createElement('tr');
                tr.className = "border-b hover:bg-gray-50 cursor-pointer";
                tr.onclick = () => renderAudiogram(row);
                
                let cells = `<td class="py-4 font-medium text-blue-600">${row.id}</td>`;
                row.scores.forEach(s => {
                    cells += `<td class="text-center">${s === 1 ? '✅' : '❌'}</td>`;
                });
                tr.innerHTML = cells;
                tbody.appendChild(tr);
            });
        }

        function renderAudiogram(patientRow) {
            const ctx = document.getElementById('audiogramChart').getContext('2d');
            if(myChart) myChart.destroy();

            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: frequencies.map(f => f + 'Hz'),
                    datasets: [{
                        label: `Hearing Profile: ${patientRow.id}`,
                        data: patientRow.scores,
                        borderColor: '#2563eb',
                        backgroundColor: 'rgba(37, 99, 235, 0.1)',
                        pointRadius: 6,
                        fill: true,
                        tension: 0.3
                    }]
                },
                options: {
                    scales: {
                        y: { 
                            min: 0, 
                            max: 1.2,
                            ticks: { callback: (val) => val === 1 ? "Heard" : (val === 0 ? "Not Heard" : "") }
                        }
                    }
                }
            });
        }
    </script>
</body>
</html>
