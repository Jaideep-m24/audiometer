<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby2HXHwRWdESL_NDLH8AdwEeroAgLuhJBTo0nGsLZ75W0jHA_VbF5keuEqNIzQm9Z57/exec";

let allData = [];
let chartInstance = null;

// ✅ WAIT FOR PAGE LOAD
window.onload = () => {
    init();
};

// 🔁 SWITCH TAB
function switchTab(tabId) {
    document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    
    document.getElementById(tabId).classList.add('active');
    document.getElementById('btn-' + tabId).classList.add('active');
    
    if(tabId === 'doctor') init();
}

// 🌐 LOAD DATA
async function init() {
    const selector = document.getElementById('patientSelect');

    try {
        selector.innerHTML = "<option>Loading...</option>";

        const res = await fetch(`${SCRIPT_URL}?read=true&t=${Date.now()}`);

        if (!res.ok) {
            selector.innerHTML = "<option>Server Error</option>";
            console.error("HTTP Error:", res.status);
            return;
        }

        const data = await res.json();
        console.log("DATA:", data);

        if (!Array.isArray(data) || data.length === 0) {
            selector.innerHTML = "<option>No Data Found</option>";
            return;
        }

        allData = data;

        const patients = [...new Set(allData.map(d => d.patient))].reverse();

        selector.innerHTML = "";

        patients.forEach((p, index) => {
            const opt = document.createElement("option");
            opt.value = p;
            opt.textContent = p;
            if(index === 0) opt.selected = true;
            selector.appendChild(opt);
        });

        updateDashboard();

    } catch (e) {
        console.error("FETCH ERROR:", e);
        selector.innerHTML = "<option>Error Loading</option>";
    }
}

// 📊 UPDATE DASHBOARD
function updateDashboard() {
    const selector = document.getElementById('patientSelect');
    if (!selector || !selector.value) return;

    const id = selector.value;
    const patientData = allData.filter(d => d.patient === id);

    if (patientData.length === 0) return;

    document.getElementById('testTime').innerText =
        "Date: " + patientData[0].timestamp;

    const formatPoints = (ear) => {
        return patientData
            .filter(d => d.ear === ear)
            .map(d => ({
                x: Number(d.frequency),
                y: d.status === "Heard" ? 30 : 80
            }))
            .sort((a,b)=>a.x-b.x);
    };

    renderChart(formatPoints("Right"), formatPoints("Left"));
}

// 📈 RENDER CHART
function renderChart(right, left) {
    const canvas = document.getElementById('audiogramCanvas');
    if (!canvas) return;

    const ctx = canvas.getContext('2d');

    if (chartInstance) chartInstance.destroy();

    chartInstance = new Chart(ctx, {
        type: 'line',
        data: {
            datasets: [
                {
                    label: 'Right Ear (○)',
                    data: right,
                    borderColor: 'red',
                    backgroundColor: 'red',
                    pointStyle: 'circle',
                    pointRadius: 7,
                    showLine: true
                },
                {
                    label: 'Left Ear (X)',
                    data: left,
                    borderColor: 'blue',
                    backgroundColor: 'blue',
                    pointStyle: 'crossRot',
                    pointRadius: 9,
                    showLine: true
                }
            ]
        },
        options: {
            responsive: true,
            scales: {
                x: {
                    type: 'linear',
                    min: 200,
                    max: 9000,
                    title: {
                        display: true,
                        text: "Frequency (Hz)"
                    },
                    ticks: {
                        callback: val => val + " Hz"
                    }
                },
                y: {
                    reverse: true,
                    min: 0,
                    max: 100,
                    ticks: { stepSize: 10 },
                    title: {
                        display: true,
                        text: "Hearing Level (dB HL)"
                    }
                }
            }
        }
    });
}

// 🎧 SEND RESPONSE
async function submitResponse(status) {
    const el = document.getElementById('testStatus');

    el.innerText = "Sending...";
    el.style.color = "#00796b";

    try {
        await fetch(
            `${SCRIPT_URL}?action=patientResponse&status=${status}&t=${Date.now()}`,
            { method: "GET", cache: "no-store" }
        );

        el.innerText = "Response recorded ✔";

        setTimeout(() => {
            el.innerText = "Listening...";
        }, 1500);

    } catch (err) {
        el.innerText = "Error sending response";
        el.style.color = "red";
    }
}

// 📄 PDF
async function downloadPDF() {
    const { jsPDF } = window.jspdf;
    const element = document.getElementById('reportArea');
    const patientID = document.getElementById('patientSelect').value;

    const canvas = await html2canvas(element);
    const img = canvas.toDataURL("image/png");

    const pdf = new jsPDF('l', 'mm', 'a4');
    pdf.addImage(img, 'PNG', 10, 10, 277, 150);
    pdf.save(`Audiogram_${patientID}.pdf`);
}

// 🔄 AUTO REFRESH
setInterval(() => {
    const docTab = document.getElementById('doctor');
    if (docTab && docTab.classList.contains('active')) {
        init();
    }
}, 5000);
</script>
