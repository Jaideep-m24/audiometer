<!DOCTYPE html>
<html>
<head>
    <title>Audiometry Screening Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; display: flex; flex-direction: column; align-items: center; }
        .container { width: 80%; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { color: #00796b; border-bottom: 2px solid #00796b; padding-bottom: 10px; }
        #audiogramCanvas { max-height: 400px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>PURE-TONE AUDIOMETRY SCREENING</h2>
        <canvas id="audiogramCanvas"></canvas>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzI5vIzEjn90ECGDmvBo90URY8wRLEL8BbcNv7eqEs3IyRBecm5MUvgKxuWJJQ265pU/exec";

        async function fetchData() {
            const response = await fetch(SCRIPT_URL);
            const rawData = await response.json();
            
            // Map "Heard" to 20dB (Normal) and "Not Heard" to 90dB (Failure)
            const processedData = rawData.map(item => ({
                x: item.frequency,
                y: item.status === "Heard" ? 20 : 90
            }));
            
            renderChart(processedData);
        }

        function renderChart(points) {
            const ctx = document.getElementById('audiogramCanvas').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    datasets: [{
                        label: 'Right Ear (Screening)',
                        data: points,
                        borderColor: 'red',
                        backgroundColor: 'red',
                        pointStyle: 'circle',
                        pointRadius: 8,
                        showLine: true
                    }]
                },
                options: {
                    scales: {
                        x: { type: 'logarithmic', title: { display: true, text: 'Frequency (Hz)' }, min: 125, max: 8000 },
                        y: { reverse: true, min: 0, max: 100, title: { display: true, text: 'Hearing Level (dB HL)' } }
                    }
                }
            });
        }
        fetchData();
    </script>
</body>
</html>
