<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audiometry Suite</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
:root { --primary:#00796b; --secondary:#004d40; --bg:#f0f2f5; --white:#fff; }
body { font-family:Segoe UI; background:var(--bg); padding:20px; }

.tabs { display:flex; justify-content:center; gap:10px; }
.tab-btn { padding:10px 20px; border:none; cursor:pointer; }
.active { background:var(--primary); color:#fff; }

.container { display:none; }
.container.active { display:block; }

.card { background:#fff; padding:20px; border-radius:10px; }
.btn-big { padding:20px; width:250px; font-size:18px; margin:10px; }

.heard { background:green; color:white; }
.not-heard { background:red; color:white; }
</style>
</head>

<body>

<div class="tabs">
<button class="tab-btn active" id="btn-doctor" onclick="switchTab('doctor')">Doctor</button>
<button class="tab-btn" id="btn-patient" onclick="switchTab('patient')">Patient</button>
</div>

<!-- DOCTOR -->
<div id="doctor" class="container active">
<div class="card">

<select id="patientSelect" onchange="updateDashboard()"></select>
<div id="testTime"></div>

<canvas id="audiogramCanvas"></canvas>

</div>
</div>

<!-- PATIENT -->
<div id="patient" class="container">
<div class="card" style="text-align:center">

<button class="btn-big heard" onclick="submitResponse('Heard')">HEARD</button>
<button class="btn-big not-heard" onclick="submitResponse('Not_Heard')">NOT HEARD</button>

<p id="testStatus">Waiting...</p>

</div>
</div>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby2HXHwRWdESL_NDLH8AdwEeroAgLuhJBTo0nGsLZ75W0jHA_VbF5keuEqNIzQm9Z57/exec";

let allData = [];
let chartInstance = null;

const FREQUENCIES = ['250','500','1000','2000','4000','8000'];

function switchTab(tab) {
    document.querySelectorAll('.container').forEach(c=>c.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));

    document.getElementById(tab).classList.add('active');
    document.getElementById('btn-'+tab).classList.add('active');

    if(tab==='doctor') init();
}

// LOAD DATA
async function init(){
    try{
        const res = await fetch(`${SCRIPT_URL}?read=true&t=${Date.now()}`);
        const data = await res.json();

        if(!Array.isArray(data)) return;

        allData = data;

        const patients = [...new Set(data.map(d=>d.patient))].reverse();
        const sel = document.getElementById('patientSelect');

        sel.innerHTML="";

        patients.forEach(p=>{
            let o=document.createElement('option');
            o.value=p;
            o.textContent=p;
            sel.appendChild(o);
        });

        updateDashboard();

    }catch(e){
        console.error(e);
    }
}

// UPDATE GRAPH
function updateDashboard(){
    const id = document.getElementById('patientSelect').value;
    const data = allData.filter(d=>d.patient===id);

    if(data.length>0){
        document.getElementById('testTime').innerText="Date: "+data[0].timestamp;
    }

    function buildEar(ear){
        let arr = FREQUENCIES.map(f=>{
            let d = data.find(x=>x.frequency==f && x.ear===ear);
            if(!d) return null;
            return d.status==="Heard"?20:90;
        });
        return arr;
    }

    renderChart(buildEar("Right"), buildEar("Left"));
}

// CHART
function renderChart(right,left){
    const ctx = document.getElementById('audiogramCanvas');

    if(chartInstance) chartInstance.destroy();

    chartInstance = new Chart(ctx,{
        type:'line',
        data:{
            labels:FREQUENCIES,
            datasets:[
                {
                    label:'Right Ear',
                    data:right,
                    borderColor:'red',
                    backgroundColor:'red',
                    spanGaps:true
                },
                {
                    label:'Left Ear',
                    data:left,
                    borderColor:'blue',
                    backgroundColor:'blue',
                    spanGaps:true
                }
            ]
        },
        options:{
            scales:{
                y:{
                    reverse:true,
                    min:0,
                    max:100
                }
            }
        }
    });
}

// SEND RESPONSE → ESP WILL READ THIS
async function submitResponse(status){
    const el = document.getElementById('testStatus');
    el.innerText="Sending...";

    await fetch(`${SCRIPT_URL}?action=patientResponse&status=${status}&t=${Date.now()}`);

    el.innerText="Sent ✔ Waiting for next tone...";
}

// AUTO REFRESH
setInterval(()=>{
    if(document.getElementById('doctor').classList.contains('active')){
        init();
    }
},4000);

init();

</script>

</body>
</html>
