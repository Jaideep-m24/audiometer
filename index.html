<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audiometry Suite | Screening & Results</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --primary: #00796b; --secondary: #004d40; --bg: #f0f2f5; --white: #ffffff; }
        body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        
        /* Navigation Tabs */
        .tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .tab-btn { padding: 12px 25px; border: none; border-radius: 8px; cursor: pointer; background: #cfd8dc; font-weight: bold; transition: 0.3s; }
        .tab-btn.active { background: var(--primary); color: white; box-shadow: 0 4px 10px rgba(0,121,107,0.3); }

        .container { max-width: 900px; margin: auto; display: none; }
        .container.active { display: block; }

        /* General Styling */
        .card { background: var(--white); padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        header { text-align: center; border-bottom: 2px solid var(--primary); margin-bottom: 25px; padding-bottom: 10px; }
        h2 { color: var(--primary); margin: 0; text-transform: uppercase; }

        /* Doctor Dashboard Specifics */
        .controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: #e0f2f1; padding: 15px; border-radius: 8px; }
        select, .btn { padding: 10px 18px; border-radius: 6px; border: 1px solid var(--primary); font-size: 1rem; cursor: pointer; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; border: none; }
        .btn-primary:hover { background: var(--secondary); }

        /* Patient Interface Specifics */
        .test-zone { text-align: center; padding: 40px 0; }
        .response-btns { display: flex; flex-direction: column; gap: 15px; align-items: center; margin-top: 20px; }
        .btn-big { width: 100%; max-width: 300px; padding: 25px; font-size: 1.5rem; font-weight: bold; border-radius: 15px; border: none; }
        .heard { background: #2e7d32; color: white; }
        .not-heard { background: #c62828; color: white; }
        .heard:active, .not-heard:active { transform: scale(0.95); }
        #testStatus { margin-top: 20px; color: #546e7a; font-style: italic; }

        #audiogramCanvas { background: #fff; border: 1px solid #ddd; border-radius: 4px; }
        .footer-note { font-size: 0.85rem; color: #777; margin-top: 15px; font-style: italic; }
    </style>
</head>
<body>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('doctor')">Doctor Dashboard</button>
        <button class="tab-btn" onclick="switchTab('patient')">Patient Test Room</button>
    </div>

    <div id="doctor" class="container active">
        <div class="card" id="reportArea">
            <header>
                <h2>Audiometry Screening Report</h2>
            </header>
            <div class="controls">
                <div>
                    <label for="patientSelect">Select Patient: </label>
                    <select id="patientSelect" onchange="updateDashboard()">
                        <option value="">Loading Patients...</option>
                    </select>
                </div>
                <div class="info" id="testTime" style="font-weight: bold;">Date: --:--</div>
                <button class="btn btn-primary" onclick="downloadPDF()">Download PDF</button>
            </div>
            <canvas id="audiogramCanvas"></canvas>
            <div class="footer-note">
                * Right Ear: Red Circle (○) | Left Ear: Blue Cross (X)<br>
                * Threshold: 20dB (Heard) / 90dB (Not Heard)
            </div>
        </div>
    </div>

    <div id="patient" class="container">
        <div class="card">
            <header>
                <h2>Hearing Test Interface</h2>
            </header>
            <div class="test-zone">
                <p style="font-size: 1.2rem; color: #37474f;">Please press the button below as soon as you hear a tone in your ear.</p>
                
                <div class="response-btns">
                    <button class="btn-big heard" onclick="submitResponse('Heard')">I HEARD IT</button>
                    <button class="btn-big not-heard" onclick="submitResponse('Not_Heard')">NOT HEARD</button>
                </div>
                
                <div id="testStatus">Ready to begin. Wait for the signal...</div>
            </div>
        </div>
    </div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzr0fLJLBCitIMONnu8FOWjXCzscbyROJUvsIMnWnk-PDWHvDrxzCbEhOuegnGreHSO/exec";
    
    let allData = [];
    let chartInstance = null;

    // --- TAB SYSTEM ---
    function switchTab(tabId) {
        document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
        if(tabId === 'doctor') init(); // Refresh data when opening dashboard
    }

    // --- DOCTOR LOGIC ---
    async function init() {
        try {
            const response = await fetch(`${SCRIPT_URL}?read=true`);
            allData = await response.json();
            const patients = [...new Set(allData.map(item => item.patient))].sort();
            const selector = document.getElementById('patientSelect');
            selector.innerHTML = "";
            
            patients.forEach(pid => {
                const opt = document.createElement('option');
                opt.value = pid; opt.textContent = pid;
                selector.appendChild(opt);
            });
            updateDashboard();
        } catch (e) { console.error("Fetch Error:", e); }
    }

    function updateDashboard() {
        const selectedID = document.getElementById('patientSelect').value;
        const patientData = allData.filter(item => item.patient === selectedID);
        if (patientData.length > 0) {
            document.getElementById('testTime').textContent = `Date: ${patientData[0].timestamp || 'N/A'}`;
        }
        const rightData = patientData.filter(d => d.ear === "Right").map(d => ({ x: Number(d.frequency), y: d.status === "Heard" ? 20 : 90 })).sort((a,b)=>a.x-b.x);
        const leftData = patientData.filter(d => d.ear === "Left").map(d => ({ x: Number(d.frequency), y: d.status === "Heard" ? 20 : 90 })).sort((a,b)=>a.x-b.x);
        renderChart(rightData, leftData);
    }

    function renderChart(right, left) {
        const ctx = document.getElementById('audiogramCanvas').getContext('2d');
        if (chartInstance) chartInstance.destroy();
        chartInstance = new Chart(ctx, {
            type: 'line',
            data: {
                datasets: [
                    { label: 'Right Ear', data: right, borderColor: 'red', pointStyle: 'circle', pointRadius: 7, showLine: true },
                    { label: 'Left Ear', data: left, borderColor: 'blue', pointStyle: 'crossRot', pointRadius: 9, showLine: true }
                ]
            },
            options: {
                scales: {
                    x: { type: 'logarithmic', min: 125, max: 8000, title: { display: true, text: 'Frequency (Hz)' } },
                    y: { reverse: true, min: 0, max: 100, title: { display: true, text: 'Hearing Level (dB HL)' } }
                }
            }
        });
    }

    // --- PATIENT LOGIC ---
    async function submitResponse(status) {
        const statusEl = document.getElementById('testStatus');
        statusEl.innerText = "Recording your response...";
        statusEl.style.color = "#00796b";
        
        try {
            await fetch(`${SCRIPT_URL}?action=patientResponse&status=${status}`);
            statusEl.innerText = "Response saved! The next tone will play shortly...";
            setTimeout(() => { statusEl.innerText = "Listening..."; }, 2000);
        } catch (e) {
            statusEl.innerText = "Error saving response. Please check internet.";
            statusEl.style.color = "red";
        }
    }

    // --- EXPORT LOGIC ---
    async function downloadPDF() {
        const { jsPDF } = window.jspdf;
        const element = document.getElementById('reportArea');
        const patientID = document.getElementById('patientSelect').value;
        const btn = document.querySelector('.btn-primary');
        
        btn.style.visibility = 'hidden';
        const canvas = await html2canvas(element);
        const imgData = canvas.toDataURL('image/png');
        const pdf = new jsPDF('l', 'mm', 'a4');
        pdf.addImage(imgData, 'PNG', 10, 10, 277, 150);
        pdf.save(`Report_${patientID}.pdf`);
        btn.style.visibility = 'visible';
    }

    init();
</script>
</body>
</html>
